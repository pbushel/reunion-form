<!DOCTYPE html>
<html>
<meta charset='UTF-8'>

<style>
body {
  font-family: Arial;
  background:
    repeating-linear-gradient(45deg, rgba(247,169,168,0.25), rgba(247,169,168,0.25) 8px, rgba(243,161,159,0.25) 8px, rgba(243,161,159,0.25) 16px),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(to right, #00cfe8, #20b2aa, #ff6f61);
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container {
  background:white;
  padding:25px;
  border-radius:12px;
  width:650px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.header {
  display:flex;
  gap:20px;
}

.flag {width:120px}

h1 {margin:0}
h2 {margin-top:20px}

img.shirt {display:block; margin-top:10px; width:260px}

.row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}

.row label {width:220px; text-align:right}
.row input {width:80px}

.total {
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin-top:15px;
}

.buttons {text-align:center; margin-top:15px}

button {
  background:#20b2aa;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  margin:5px;
  cursor:pointer;
}

button:hover {background:#17847f}

.contact {text-align:center; margin-top:15px; font-weight:bold}

</style>

  subtotal += Number(document.getElementById("adultXXXXL").value) * 25;

  // Kids shirts
  subtotal += Number(document.getElementById("kidsXS").value) * 20;
  subtotal += Number(document.getElementById("kidsS").value) * 20;
  subtotal += Number(document.getElementById("kidsM").value) * 20;
  subtotal += Number(document.getElementById("kidsL").value) * 20;

  // Dues
  subtotal += Number(document.getElementById("dues").value) * 5;

  // ✅ Calculate Stripe fee (2.9% + $0.30)
  let fee = subtotal * 0.029 + 0.30;

  // ✅ Round to 2 decimals
  fee = Math.round(fee * 100) / 100;

  let totalWithFee = subtotal + fee;
  totalWithFee = Math.round(totalWithFee * 100) / 100;

  // ✅ Display values
  document.getElementById("subtotal").innerText = subtotal.toFixed(2);
  document.getElementById("fee").innerText = fee.toFixed(2);
  document.getElementById("total").innerText = totalWithFee.toFixed(2);
}

function payNow() {

  // ✅ GET VALUES ONCE
  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();

  // ✅ REQUIRED FIELD CHECK
  if (!firstName || !lastName || !email || !phone) {
    alert("Please fill in First Name, Last Name, Email, and Cell Phone.");
    return;
  }

  let total = Number(document.getElementById("total").innerText);

  if (isNaN(total) || total <= 0) {
    alert("Please calculate total first.");
    return;
  }

  // ✅ FIXED shirt strings (correct IDs)
  let adultShirts =
    "S:" + document.getElementById("adultS").value +
    ", M:" + document.getElementById("adultM").value +
    ", L:" + document.getElementById("adultL").value +
    ", XL:" + document.getElementById("adultXL").value +
    ", XXL:" + document.getElementById("adultXXL").value +
    ", XXXL:" + document.getElementById("adultXXXL").value +
    ", XXXXL:" + document.getElementById("adultXXXXL").value;

  let kidsShirts =
    "XS:" + document.getElementById("kidsXS").value +
    ", S:" + document.getElementById("kidsS").value +
    ", M:" + document.getElementById("kidsM").value +
    ", L:" + document.getElementById("kidsL").value;

  fetch("https://gorgeous-crepe-f1522b.netlify.app/.netlify/functions/create-checkout", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: total,
      firstName: document.getElementById("firstName").value,
      lastName: document.getElementById("lastName").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      adultShirts: adultShirts,
      kidsShirts: kidsShirts,
      dues: document.getElementById("dues").value,
      total: total,
      status: "Paid"
    })
  })

  .then(res => res.json())
  .then(data => {
    console.log("Response data:", data);  // ✅ DEBUG
  
    if (data.url) {
      window.location.href = data.url;   // ✅ Stripe redirect
    } else {
      alert("No payment URL returned.");
    }
  })
  .catch(err => {
    console.error("Payment error:", err);
    alert("Payment failed — see console.");
  });
}
